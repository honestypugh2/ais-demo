<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 680" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="mp" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#5C2D91"/></marker>
    <marker id="mb" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0F6CBD"/></marker>
    <marker id="mu" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8661C5"/></marker>
    <marker id="mo" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#D83B01"/></marker>
  </defs>
  <rect x="0" y="0" width="1120" height="680" fill="#FFFFFF"/>
  <text x="40" y="32" font-size="16" font-weight="700" fill="#0F548C">Path to production — APIM landing zone (network-isolated target)</text>
  <text x="40" y="56" font-size="11" fill="#605E5C">The demo uses public endpoints for speed. In production, isolate with VNet integration + Private Endpoints and front with WAF.</text>

  <!-- Bands -->
  <g>
    <rect x="40" y="76"  width="1040" height="80"  rx="4" fill="#F3F2F1" stroke="#8A8886" stroke-dasharray="4 3"/><text x="52" y="94" font-size="11" font-weight="700" fill="#605E5C">1) CHANNELS &amp; USERS</text>
    <rect x="40" y="168" width="1040" height="80"  rx="4" fill="#EDEBF9" stroke="#5C2D91" stroke-dasharray="4 3"/><text x="52" y="186" font-size="11" font-weight="700" fill="#5C2D91">2) EDGE / IDENTITY</text>
    <rect x="40" y="260" width="1040" height="100" rx="4" fill="#E5F0FB" stroke="#0F6CBD" stroke-dasharray="4 3"/><text x="52" y="278" font-size="11" font-weight="700" fill="#0F548C">3) APIM LANDING ZONE (Hub VNet)</text>
    <rect x="40" y="372" width="1040" height="90"  rx="4" fill="#F4EEFB" stroke="#8661C5" stroke-dasharray="4 3"/><text x="52" y="390" font-size="11" font-weight="700" fill="#5C2D91">4) APPLICATION TIER (Spoke VNet)</text>
    <rect x="40" y="474" width="1040" height="100" rx="4" fill="#EAF7EA" stroke="#107C10" stroke-dasharray="4 3"/><text x="52" y="492" font-size="11" font-weight="700" fill="#0B5A0B">5) DATA + INTEGRATION (Private Endpoints)</text>
    <rect x="40" y="586" width="1040" height="80"  rx="4" fill="#F3F2F1" stroke="#5E5E5E" stroke-dasharray="4 3"/><text x="52" y="604" font-size="11" font-weight="700" fill="#323130">6) OBSERVABILITY + GOVERNANCE</text>
  </g>

  <!-- Nodes -->
  <g font-size="11.5">
    <!-- band1 -->
    <rect x="80" y="102" width="200" height="46" rx="6" fill="#fff" stroke="#605E5C"/><text x="180" y="122" fill="#201F1E" text-anchor="middle" font-weight="700">Permit Intake Portal</text><text x="180" y="138" fill="#201F1E" text-anchor="middle">(React / mobile)</text>
    <rect x="320" y="102" width="220" height="46" rx="6" fill="#fff" stroke="#605E5C"/><text x="430" y="122" fill="#201F1E" text-anchor="middle" font-weight="700">API consumers / partners</text><text x="430" y="138" fill="#201F1E" text-anchor="middle">(subscription key or JWT)</text>
    <!-- band2 -->
    <rect x="80" y="194" width="200" height="46" rx="6" fill="#0078D4" stroke="#0B4E8A"/><text x="180" y="214" fill="#fff" text-anchor="middle" font-weight="700">Azure Front Door</text><text x="180" y="230" fill="#fff" text-anchor="middle">+ WAF + DDoS</text>
    <rect x="320" y="194" width="220" height="46" rx="6" fill="#5C2D91" stroke="#3B2A6B"/><text x="430" y="214" fill="#fff" text-anchor="middle" font-weight="700">Microsoft Entra ID</text><text x="430" y="230" fill="#fff" text-anchor="middle">workforce + app registrations</text>
    <!-- band3 -->
    <rect x="80" y="288" width="300" height="56" rx="6" fill="#0078D4" stroke="#0B4E8A"/><text x="230" y="311" fill="#fff" text-anchor="middle" font-weight="700">API Management (internal VNet)</text><text x="230" y="328" fill="#fff" text-anchor="middle">JWT · rate limit · AI gateway policies</text>
    <rect x="420" y="288" width="180" height="56" rx="6" fill="#fff" stroke="#0F6CBD"/><text x="510" y="311" fill="#0F548C" text-anchor="middle" font-weight="700">Key Vault</text><text x="510" y="328" fill="#0F548C" text-anchor="middle">secrets · certs</text>
    <rect x="640" y="288" width="180" height="56" rx="6" fill="#fff" stroke="#0F6CBD"/><text x="730" y="311" fill="#0F548C" text-anchor="middle" font-weight="700">Private DNS</text><text x="730" y="328" fill="#0F548C" text-anchor="middle">+ Private Endpoints</text>
    <!-- band4 -->
    <rect x="80" y="398" width="300" height="48" rx="6" fill="#0078D4" stroke="#0B4E8A"/><text x="230" y="418" fill="#fff" text-anchor="middle" font-weight="700">Azure Functions (VNet-integrated)</text><text x="230" y="434" fill="#fff" text-anchor="middle">ProcessPermit orchestrator</text>
    <rect x="420" y="398" width="220" height="48" rx="6" fill="#8661C5" stroke="#5C2D91"/><text x="530" y="418" fill="#fff" text-anchor="middle" font-weight="700">Logic App (Standard)</text><text x="530" y="434" fill="#fff" text-anchor="middle">orchestration / routing</text>
    <!-- band5 -->
    <rect x="70" y="502" width="180" height="56" rx="6" fill="#fff" stroke="#8661C5"/><text x="160" y="525" fill="#3B2A6B" text-anchor="middle" font-weight="700">Service Bus</text><text x="160" y="541" fill="#3B2A6B" text-anchor="middle">permits-in · dead-letter</text>
    <rect x="270" y="502" width="160" height="56" rx="6" fill="#FEF0E7" stroke="#D83B01"/><text x="350" y="525" fill="#A5310A" text-anchor="middle" font-weight="700">Event Grid</text><text x="350" y="541" fill="#A5310A" text-anchor="middle">PermitCreated</text>
    <rect x="450" y="502" width="170" height="56" rx="6" fill="#EAF7EA" stroke="#107C10"/><text x="535" y="525" fill="#0B5A0B" text-anchor="middle" font-weight="700">Azure OpenAI</text><text x="535" y="541" fill="#0B5A0B" text-anchor="middle">compliance model</text>
    <rect x="640" y="502" width="180" height="56" rx="6" fill="#EAF7EA" stroke="#107C10"/><text x="730" y="525" fill="#0B5A0B" text-anchor="middle" font-weight="700">Document Intelligence</text><text x="730" y="541" fill="#0B5A0B" text-anchor="middle">field extraction</text>
    <rect x="840" y="502" width="200" height="56" rx="6" fill="#fff" stroke="#605E5C"/><text x="940" y="525" fill="#201F1E" text-anchor="middle" font-weight="700">CRM / records</text><text x="940" y="541" fill="#201F1E" text-anchor="middle">(system of record)</text>
    <!-- band6 -->
    <rect x="80" y="612" width="220" height="46" rx="6" fill="#fff" stroke="#5E5E5E"/><text x="190" y="632" fill="#323130" text-anchor="middle" font-weight="700">Application Insights</text><text x="190" y="648" fill="#323130" text-anchor="middle">end-to-end transactions</text>
    <rect x="340" y="612" width="220" height="46" rx="6" fill="#fff" stroke="#5E5E5E"/><text x="450" y="632" fill="#323130" text-anchor="middle" font-weight="700">Log Analytics</text><text x="450" y="648" fill="#323130" text-anchor="middle">central logs / KQL</text>
    <rect x="600" y="612" width="220" height="46" rx="6" fill="#fff" stroke="#5E5E5E"/><text x="710" y="632" fill="#323130" text-anchor="middle" font-weight="700">Azure Policy</text><text x="710" y="648" fill="#323130" text-anchor="middle">guardrails / compliance</text>
  </g>

  <!-- Flow edges (top to bottom) -->
  <g fill="none" stroke-width="2">
    <line x1="180" y1="148" x2="180" y2="192" stroke="#5C2D91" marker-end="url(#mp)"/>
    <line x1="180" y1="240" x2="200" y2="286" stroke="#0F6CBD" marker-end="url(#mb)"/>
    <line x1="380" y1="316" x2="418" y2="410" stroke="#8661C5" marker-end="url(#mu)"/>
    <line x1="430" y1="446" x2="200" y2="500" stroke="#8661C5" marker-end="url(#mu)"/>
    <line x1="200" y1="446" x2="180" y2="500" stroke="#0078D4" marker-end="url(#mb)"/>
    <line x1="250" y1="530" x2="268" y2="530" stroke="#D83B01" marker-end="url(#mo)"/>
  </g>
</svg>
